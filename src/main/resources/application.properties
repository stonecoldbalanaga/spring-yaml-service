server.port=8080

# -----------------------------------------------
# JWT Configuration
# -----------------------------------------------
# IMPORTANT: change this secret in production (min 32 characters, ideally 64+)
jwt.secret=MySuperSecretKeyForJwtSigningThatIsAtLeast32Chars!
jwt.expiration-ms=3600000

# -----------------------------------------------
# YAML file path
# -----------------------------------------------
# Relative to classpath by default; can be an absolute filesystem path too.
# Example: app.yaml.file-path=/etc/yaml-service/appvalues.yaml
app.yaml.file-path=appvalues.yaml

# -----------------------------------------------
# Logging
# -----------------------------------------------
logging.level.com.example.yamlservice=DEBUG
logging.level.org.springframework.security=WARN
